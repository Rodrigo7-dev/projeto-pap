<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>API Frontend Test</h1>
    <div id="results"></div>
    
    <script>
        const API_URL = 'http://127.0.0.1:8000/api';
        let authToken = null;
        
        const api = axios.create({
            baseURL: API_URL,
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            }
        });
        
        async function runTests() {
            const results = document.getElementById('results');
            
            try {
                // Test Login
                const loginResponse = await api.post('/login', {
                    email: 'test2@example.com',
                    password: 'password123'
                });
                authToken = loginResponse.data.token;
                results.innerHTML += '<p>✅ Login successful</p>';
                
                // Test Stats
                const statsResponse = await api.get('/stats', {
                    headers: { Authorization: `Bearer ${authToken}` }
                });
                results.innerHTML += '<p>✅ Stats: ' + JSON.stringify(statsResponse.data) + '</p>';
                
                // Test Processos
                const processosResponse = await api.get('/processos', {
                    headers: { Authorization: `Bearer ${authToken}` }
                });
                results.innerHTML += '<p>✅ Processos: ' + processosResponse.data.data?.length + ' items</p>';
                
                results.innerHTML += '<h2>🎉 Frontend API integration working!</h2>';
                
            } catch (error) {
                results.innerHTML += '<p>❌ Error: ' + error.message + '</p>';
            }
        }
        
        runTests();
    </script>
</body>
</html>
