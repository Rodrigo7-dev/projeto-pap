services:
  # Frontend Vue.js
  - type: web
    name: projeto-pap-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://myapp-api-production-a4fa.up.railway.app/api
      - key: VITE_APP_NAME
        value: Sistema de Gestão
      - key: VITE_APP_ENV
        value: production

# Auto-deploy configuration
autoDeploy: yes
branch: main
