services:
  # Frontend Vue.js Service
  - type: web
    name: frontend-vue
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: http://myapp-api-production-a4fa.up.railway.app/api
      - key: VITE_APP_NAME
        value: Sistema de Gestão
      - key: VITE_APP_ENV
        value: production

# Auto-deploy configuration
autoDeploy: yes
branch: main
