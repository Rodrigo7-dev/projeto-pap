services:
  # API Server Service
  - type: web
    name: api-server
    env: node
    buildCommand: npm install --production
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20

  # Frontend Vue.js Service
  - type: web
    name: frontend-vue
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://api-server.onrender.com/api
      - key: VITE_APP_NAME
        value: Sistema de Gestão
      - key: VITE_APP_ENV
        value: production

# Auto-deploy configuration
autoDeploy: yes
branch: main
